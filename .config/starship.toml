palette = "arasaka"
add_newline = true
command_timeout = 750
format = """
[┌─SYS](fg:yellow bold)\
$os\
$username\
$hostname\
[─ZONE](fg:muted)\
$directory\
$ruby\
$python\
$rust\
$nodejs\
$fill\
$time\
$line_break\
[└─](fg:muted)\
$git_branch\
${custom.submodule_status}\
${custom.git_state}\
$jobs\
${custom.alert_status}\
${custom.prompt_char}"""

[palettes.arasaka]
bg = "#0a0f14"
fg = "#93a1ad"
muted = "#55606b"
yellow = "#f7f779"
cyan = "#35f2ff"
red = "#ff4d6d"
orange = "#ff9f1c"
blue = "#4da6ff"

[os]
disabled = false
format = "[ $symbol](fg:yellow bold)"

[os.symbols]
Macos = "MAC"
Ubuntu = "UBU"
Debian = "DEB"
Fedora = "FED"
Arch = "ARC"
Linux = "LNX"

[username]
show_always = false
style_user = "fg:bg bg:yellow bold"
style_root = "fg:bg bg:red bold"
format = "[ $user ]($style)"

[hostname]
ssh_only = true
format = "[ @$hostname ](fg:bg bg:cyan bold)"
trim_at = "."

[directory]
style = "fg:fg bold"
format = "[ $path ]($style)"
truncation_length = 4
truncation_symbol = "../"
truncate_to_repo = false

[directory.substitutions]
"~" = "HOME"

[fill]
symbol = "─"
style = "fg:muted"

[time]
disabled = false
time_format = "%H:%M"
style = "fg:bg bg:yellow bold"
format = "[ T:$time ]($style)"

[git_branch]
symbol = ""
style = "fg:red bold"
format = "[ BR:$branch ]($style)"

[custom.submodule_status]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1 && git submodule status --recursive 2>/dev/null | grep -Eq '^[+U-]'"
command = "printf ' SUB '"
style = "fg:bg bg:yellow bold"
format = "[$output]($style)"

[custom.worktree_dirty]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1 && ( ! git diff --quiet --ignore-submodules=dirty || ! git diff --cached --quiet --ignore-submodules=dirty || test -n \"$(git ls-files --others --exclude-standard)\" )"
command = "printf '! '"
style = "fg:bg bg:red bold"
format = "[$output]($style)"

[custom.stash_marker]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1 && test -n \"$(git stash list 2>/dev/null)\""
command = "printf '≡ '"
style = "fg:bg bg:red bold"
format = "[$output]($style)"

[custom.git_state]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
command = '''
git status --porcelain --branch 2>/dev/null | awk '
BEGIN { dirty=0 }
NR==1 && substr($0,1,2)=="##" {
  if (match($0, /ahead [0-9]+/))  ahead  = substr($0, RSTART+6, RLENGTH-6)
  if (match($0, /behind [0-9]+/)) behind = substr($0, RSTART+7, RLENGTH-7)
  next
}
{
  dirty=1
  if (substr($0,1,2)=="??") { new++; next }
  x=substr($0,1,1); y=substr($0,2,1)
  if (x=="U" || y=="U") { con++; next }
  if (x=="A" || x=="M") add++
  if (x=="D" || y=="D") del++
  if (x=="R" || y=="R") ren++
  if (y=="M") mod++
}
END {
  parts=""
  if (dirty)          parts="! "
  if (con>0)          parts=parts "CON:" con " "
  if (add>0)          parts=parts "ADD:" add " "
  if (del>0)          parts=parts "DEL:" del " "
  if (ren>0)          parts=parts "REN:" ren " "
  if (mod>0)          parts=parts "MOD:" mod " "
  if (new>0)          parts=parts "NEW:" new " "
  if (ahead!="")      parts=parts "↑" ahead " "
  if (behind!="")     parts=parts "↓" behind " "
  if (parts!="") printf " %s", parts
  else           printf " CLR "
}
'
'''
style = "fg:bg bg:red bold"
format = "[$output]($style)"

[ruby]
symbol = "RB"
style = "fg:red bold"
format = "[ $symbol:$version ]($style)"
detect_extensions = []

[nodejs]
disabled = true

[python]
symbol = "PY"
style = "fg:red bold"
format = "[ $symbol:$version ]($style)"

[rust]
symbol = "RS"
style = "fg:red bold"
format = "[ $symbol:$version ]($style)"

[package]
disabled = true

[jobs]
symbol = "JOBS"
style = "fg:cyan bold"
number_threshold = 1
format = "[ $symbol:$number ]($style)"

[custom.alert_status]
when = "test \"${STARSHIP_CMD_STATUS:-0}\" -ne 0 && test \"${STARSHIP_CMD_STATUS:-0}\" -ne 141"
command = "printf ' ALERT:%s ' \"$STARSHIP_CMD_STATUS\""
style = "fg:red bold"
format = "[$output]($style)"

[custom.prompt_char]
when = "true"
command = "if [ \"${STARSHIP_CMD_STATUS:-0}\" -ne 0 ] && [ \"${STARSHIP_CMD_STATUS:-0}\" -ne 141 ]; then printf '!!'; else printf '>>>'; fi"
style = "fg:yellow bold"
format = "[ $output ]($style)"
